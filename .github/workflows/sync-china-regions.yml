name: Sync China Regions

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/sync-china-regions.yml"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download and validate region data
        run: |
          mkdir -p app/src/main/assets
          python - <<'PY'
          import json
          import urllib.request
          from pathlib import Path

          url = "https://raw.githubusercontent.com/modood/Administrative-divisions-of-China/master/dist/pca-code.json"
          with urllib.request.urlopen(url, timeout=60) as response:
              data = json.load(response)
          if not isinstance(data, list) or len(data) < 30:
              raise SystemExit("Region data validation failed")
          target = Path("app/src/main/assets/china_regions.json")
          target.write_text(json.dumps(data, ensure_ascii=False, separators=(",", ":")), encoding="utf-8")
          PY
      - name: Commit region data
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add app/src/main/assets/china_regions.json
          git diff --cached --quiet || git commit -m "Update complete China region data"
          git push
